<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RideIt Conductores</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@latest/dist/tailwind.min.css">
</head>
<body class="bg-black text-white font-sans">

    <!-- Contenedor principal -->
    <div class="flex flex-col min-h-screen justify-center items-center">
        <h1 class="text-4xl font-extrabold text-blue-500 mb-8">Inicia Sesión</h1>

        <!-- Mensajes de error -->
        <?php if (isset($_GET['error'])): ?>
            <div class="bg-red-800 text-red-200 p-4 rounded-lg mb-4 text-center w-80">
                <?php
                if ($_GET['error'] === 'empty_fields') {
                    echo "Por favor, completa todos los campos.";
                } elseif ($_GET['error'] === 'user_not_found') {
                    echo "Usuario no encontrado. Verifica tu correo.";
                } elseif ($_GET['error'] === 'invalid_password') {
                    echo "Contraseña incorrecta. Inténtalo de nuevo.";
                }
                ?>
            </div>
        <?php endif; ?>

        <!-- Formulario de inicio de sesión -->
        <form action="login.php" method="POST" class="bg-gray-800 p-6 rounded-lg shadow-md w-80">
            <div class="mb-4">
                <label for="email" class="block text-sm font-medium text-gray-300">Correo Electrónico</label>
                <input type="email" id="email" name="email" required class="w-full px-4 py-2 border border-gray-600 rounded-lg mt-2 bg-gray-900 text-gray-100">
            </div>
            <div class="mb-4">
                <label for="password" class="block text-sm font-medium text-gray-300">Contraseña</label>
                <input type="password" id="password" name="password" required class="w-full px-4 py-2 border border-gray-600 rounded-lg mt-2 bg-gray-900 text-gray-100">
            </div>
            <button type="submit" class="w-full bg-blue-500 text-white py-3 rounded-lg font-bold hover:bg-blue-600 transition">
                Iniciar Sesión
            </button>
        </form>
    </div>

</body>
</html>
