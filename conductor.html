<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio - RideIt Conductores</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@latest/dist/tailwind.min.css">
    <script>
        // Actualizar el reloj en formato de 12 horas (AM/PM)
        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const seconds = now.getSeconds().toString().padStart(2, '0');
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12 || 12;
            document.getElementById("clock").textContent = `${hours}:${minutes}:${seconds} ${ampm}`;
        }
        setInterval(updateClock, 1000);
    </script>
</head>
<body class="bg-black text-white font-sans">

    <!-- Encabezado -->
    <header class="bg-gradient-to-r from-gray-800 via-gray-900 to-black text-white p-6 flex justify-between items-center shadow-md">
        <div class="text-2xl font-extrabold">🚖 RideIt - Conductores</div>
    </header>

    <!-- Bienvenida -->
    <section class="text-center py-20 bg-gradient-to-b from-gray-900 to-black">
        <h1 class="text-5xl font-extrabold mb-4">Bienvenido, Conductor</h1>
        <p class="text-lg mb-6 font-light">Administra tus viajes, estado y ganancias fácilmente.</p>
        <!-- Reloj Digital -->
        <div id="clock" class="text-6xl font-mono font-bold my-8 text-blue-500"></div>
        <!-- Botón de inicio de sesión -->
        <div class="flex justify-center">
            <a href="login_conductor.php" class="bg-blue-500 text-white px-8 py-3 rounded-full font-bold hover:bg-blue-600 transition-all duration-300 shadow-lg">
                Iniciar Sesión
            </a>
        </div>
    </section>

    <!-- Pie de Página -->
    <footer class="bg-gradient-to-r from-gray-900 to-black text-gray-400 text-center py-6">
        <p class="text-sm">© 2025 RideIt Conductores. Todos los derechos reservados.</p>
    </footer>

    <script>
        // Inicializar el reloj
        updateClock();
    </script>
</body>
</html>
